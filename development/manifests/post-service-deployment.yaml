apiVersion: apps/v1
kind: Deployment
metadata:
    name: post-service-deployment
    namespace: development
    labels:
      app: post-service
spec:
  selector:
    matchLabels:
      app: post-service
  template:
    metadata:
      labels:
        app: post-service
    spec:
      containers:
      - name: post-service
        image: tiagomadeiradock/tokio-post-service:v1
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            memory: 512Mi
            cpu: "1"
          requests:
            memory: 256Mi
            cpu: "0.1"
        ports:
          - name: http
            protocol: TCP
            containerPort: 8000
        env:
          - name: AUTH_SERVICE_URL
            valueFrom:
             configMapKeyRef:
                name: post-service-configmap
                key: auth_service_url

      imagePullSecrets:
      - name: regcred
              
---
apiVersion: v1
kind: Service
metadata:
  name: post-internal-service
  namespace: development
spec:
  selector:
    app: post-service
  type: ClusterIP
  ports:
    - port: 8000
      protocol: TCP
      targetPort: http