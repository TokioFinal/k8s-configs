apiVersion: apps/v1
kind: Deployment
metadata:
    name: auth-service-deployment
    namespace: staging
    labels:
      app: auth-service
spec:
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: tiagomadeiradock/tokio-auth-service:008c427

        imagePullPolicy: IfNotPresent
        resources:
          limits:
            memory: 512Mi
            cpu: "1"
          requests:
            memory: 256Mi
            cpu: "0.1"
        ports:
          - name: http
            protocol: TCP
            containerPort: 8000
        env:
          - name: ACCESS_TOKEN_EXPIRE_MINUTES
            valueFrom:
             configMapKeyRef:
                name: auth-service-configmap
                key: access_token_expire_minutes
          - name: SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: auth-service-secrets
                key: secret-key
          - name: OTEL_SERVICE_NAME
            valueFrom:
             configMapKeyRef:
                name: auth-service-configmap
                key: otel-service-name

          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            valueFrom:
             configMapKeyRef:
                name: auth-service-configmap
                key: otel-exporter-endpoint
          
          - name: OTEL_EXPORTER_OTLP_INSECURE 
            valueFrom:
             configMapKeyRef:
                name: auth-service-configmap
                key: otel-exporter-insecure

          - name: OTEL_METRICS_EXPORTER
            valueFrom:
             configMapKeyRef:
                name: auth-service-configmap
                key: otel-metrics-exporter

          - name: OTEL_LOGS_EXPORTER
            valueFrom:
             configMapKeyRef:
                name: auth-service-configmap
                key: otel-logs-exporter

      imagePullSecrets:
      - name: regcred
              
---
apiVersion: v1
kind: Service
metadata:
  name: auth-internal-service
  namespace: staging
spec:
  selector:
    app: auth-service
  type: ClusterIP
  ports:
    - port: 8000
      protocol: TCP
      targetPort: http